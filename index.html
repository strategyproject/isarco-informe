<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ISARCO - Estado de Obra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: sans-serif;
            background-color: white;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        .edificio {
            display: flex;
            flex-direction: column-reverse;
            gap: 15px;
            margin-bottom: 40px;
        }
        .piso {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .piso-label {
            font-weight: bold;
            min-width: 60px;
            color: #333;
            font-size: 14px;
        }
        .apartamentos {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            flex: 1;
        }
        .apartamento {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
        }
        .apartamento.instalado {
            background-color: #C0DD97;
            color: #27500A;
            border-color: #27500A;
        }
        .apartamento.en-proceso {
            background-color: #FAC775;
            color: #633806;
            border-color: #633806;
        }
        .apartamento.pendiente {
            background-color: #f0f0f0;
            color: #888888;
            border-color: #888888;
        }
        .numero {
            font-size: 20px;
            font-weight: bold;
        }
        .estado {
            font-size: 12px;
        }
        .contador {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
        }
        .contador-item {
            text-align: center;
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid;
        }
        .contador-item.instalado {
            background-color: #C0DD97;
            color: #27500A;
            border-color: #27500A;
        }
        .contador-item.en-proceso {
            background-color: #FAC775;
            color: #633806;
            border-color: #633806;
        }
        .contador-item.pendiente {
            background-color: #f0f0f0;
            color: #888888;
            border-color: #888888;
        }
        .contador-numero {
            font-size: 32px;
            font-weight: bold;
        }
        .contador-label {
            font-size: 14px;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .apartamentos {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .piso {
                flex-direction: column;
                align-items: flex-start;
            }
            .piso-label {
                margin-bottom: 5px;
            }
            .apartamento {
                min-height: 70px;
                padding: 10px 5px;
            }
            .numero {
                font-size: 16px;
            }
            .estado {
                font-size: 10px;
            }
            h1 {
                font-size: 22px;
            }
            .contador {
                gap: 15px;
            }
            .contador-numero {
                font-size: 24px;
            }
        }
        @media (max-width: 480px) {
            .apartamentos {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
