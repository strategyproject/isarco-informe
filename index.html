```html
<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ISARCO - Estado de Obra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: sans-serif;
            background-color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }
        .piso {
            margin-bottom: 20px;
        }
        .piso-titulo {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 18px;
        }
        .apartamentos {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
        }
        .apartamento {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .numero {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .estado {
            font-size: 12px;
        }
        .instalado {
            background-color: #C0DD97;
            color: #27500A;
        }
        .en-proceso {
            background-color: #FAC775;
            color: #633806;
        }
        .pendiente {
            background-color: #f0f0f0;
            color: #888888;
        }
        .contador {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .contador-item {
            text-align: center;
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }
        .contador-numero {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .contador-label {
            font-size: 14px;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            .apartamentos {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .apartamento {
                padding: 10px;
                min-height: 60px;
            }
            .numero {
                font-size: 14px;
            }
            .estado {
                font-size: 10px;
            }
            h1 {
                font-size: 22px;
            }
            .contador {
                gap: 20px;
            }
            .contador-item {
                padding: 10px 20px;
            }
            .contador-numero {
                font-size: 24px;
            }
        }
        @media (max-width: 480px) {
            .apartamentos {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class='container'>
        <h1>ISARCO - Estado de Obra</h1>
        <div class='mensaje' style='text-align: center; color: #888; padding: 40px;'>
            No hay datos de apartamentos disponibles
        </div>
        <div class='contador'>
            <div class='contador-item instalado'>
                <div class='contador-numero'>0</div>
                <div class='contador-label'>Instalados</div>
            </div>
            <div class='contador-item en-proceso'>
                <div class='contador-numero'>0</div>
                <div class='contador-label'>En Proceso</div>
            </div>
            <div class='contador-item pendiente'>
                <div class='contador-numero'>0</div>
                <div class='contador-label'>Pendientes</div>
            </div>
        </div>
    </div>
</body>
</html>
