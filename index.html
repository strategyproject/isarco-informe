```html
<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ISARCO - Estado de Obra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: sans-serif;
            background-color: #ffffff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .floor {
            margin-bottom: 15px;
        }
        .floor-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .apartments {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
        }
        .apartment {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .apartment-number {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .apartment-status {
            font-size: 12px;
        }
        .instalado {
            background-color: #C0DD97;
            color: #27500A;
        }
        .en-proceso {
            background-color: #FAC775;
            color: #633806;
        }
        .pendiente {
            background-color: #f0f0f0;
            color: #888888;
        }
        .summary {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .summary-item {
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
            min-width: 150px;
        }
        .summary-item .count {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .summary-item .label {
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .apartments {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }
            .apartment {
                padding: 10px;
                min-height: 70px;
            }
            .apartment-number {
                font-size: 16px;
            }
            .apartment-status {
                font-size: 11px;
            }
            h1 {
                font-size: 24px;
            }
        }
        @media (max-width: 480px) {
            .apartments {
                grid-template-columns: repeat(2, 1fr);
            }
            .summary {
                gap: 15px;
            }
            .summary-item {
                min-width: 120px;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class='container'>
        <h1>ISARCO - Estado de Obra</h1>
        <div class='building'>
            <div class='floor'>
                <div class='floor-label'>No hay datos disponibles</div>
            </div>
        </div>
        <div class='summary'>
            <div class='summary-item instalado'>
                <div class='count'>0</div>
                <div class='label'>Instalados</div>
            </div>
            <div class='summary-item en-proceso'>
                <div class='count'>0</div>
                <div class='label'>En proceso</div>
            </div>
            <div class='summary-item pendiente'>
                <div class='count'>0</div>
                <div class='label'>Pendientes</div>
            </div>
        </div>
    </div>
</body>
</html>
