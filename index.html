```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de Obra</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#fff;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{text-align:center;margin-bottom:30px;color:#333;font-size:24px}
.floor{margin-bottom:25px}
.floor-title{font-size:16px;font-weight:bold;margin-bottom:10px;color:#555}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.apt{padding:20px;border-radius:8px;text-align:center;box-shadow:0 2px 4px rgba(0,0,0,.1)}
.apt-number{font-size:18px;font-weight:bold;margin-bottom:5px}
.apt-status{font-size:13px}
.instalado{background:#C0DD97;color:#27500A}
.proceso{background:#FAC775;color:#633806}
.pendiente{background:#f0f0f0;color:#888}
.summary{margin-top:40px;padding:20px;background:#f9f9f9;border-radius:8px}
.summary h2{font-size:18px;margin-bottom:15px;color:#333}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.stat{padding:15px;border-radius:6px;text-align:center}
.stat-number{font-size:28px;font-weight:bold;margin-bottom:5px}
.stat-label{font-size:14px}
@media(max-width:600px){
.grid{grid-template-columns:repeat(2,1fr)}
.apt{padding:15px}
.apt-number{font-size:16px}
}
</style>
</head>
<body>
<div class='container'>
<h1>Estado de Obra - Apartamentos</h1>
<div class='floor'>
<div class='floor-title'>Piso 1</div>
<div class='grid'>
<div class='apt pendiente'>
<div class='apt-number'>101</div>
<div class='apt-status'>Pendiente</div>
</div>
<div class='apt pendiente'>
<div class='apt-number'>102</div>
<div class='apt-status'>Pendiente</div>
</div>
</div>
</div>
<div class='summary'>
<h2>Resumen General</h2>
<div class='stats'>
<div class='stat instalado'>
<div class='stat-number'>0</div>
<div class='stat-label'>Instalados</div>
</div>
<div class='stat proceso'>
<div class='stat-number'>0</div>
<div class='stat-label'>En Proceso</div>
</div>
<div class='stat pendiente'>
<div class='stat-number'>2</div>
<div class='stat-label'>Pendientes</div>
</div>
</div>
</div>
</div>
</body>
</html>
